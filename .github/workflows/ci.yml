name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint (ESLint + Solhint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies (includes sdk + cli workspaces)
        run: npm ci

      - name: Run ESLint (SDK)
        run: cd sdk && npx eslint . --max-warnings 0

      - name: Run ESLint (CLI)
        run: cd cli && npx eslint . --max-warnings 0

      - name: Install Solhint
        run: npm install -g solhint

      - name: Run Solhint
        run: solhint 'contracts/**/*.sol'

  test-contracts:
    name: Test Contracts (Foundry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Foundry
        uses: actions/cache@v5
        with:
          path: |
            ~/.foundry
            ~/.cargo
          key: foundry-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml') }}
          restore-keys: |
            foundry-${{ runner.os }}-

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Forge dependencies
        run: cd contracts && forge install

      - name: Run Forge tests
        run: cd contracts && forge test -v 2>&1 | tee gas-report.txt

      - name: Upload gas report
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: gas-report.txt
          retention-days: 30

  test-sdk:
    name: Test SDK + API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies (workspaces)
        run: npm ci

      - name: Install API dependencies
        run: cd api && npm ci

      - name: Run SDK tests
        run: cd sdk && npx vitest run

      - name: Run API tests
        run: cd api && npx vitest run

  security-scan:
    name: Security Scan (Slither)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Slither
        run: pip3 install slither-analyzer

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run Slither analysis
        run: slither . --json slither-report.json || true

      - name: Upload Slither report
        uses: actions/upload-artifact@v4
        with:
          name: slither-report
          path: slither-report.json
          retention-days: 30

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies (workspaces)
        run: npm ci

      - name: Build SDK + CLI
        run: npm run build
