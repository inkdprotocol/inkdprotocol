name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Contracts — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        run: cd contracts && forge build --force

      - name: Test (unit + fuzz)
        run: cd contracts && forge test -vv

      - name: Invariant tests
        run: cd contracts && forge test --match-contract InkdInvariantTest -vv

      - name: Check for warnings
        run: |
          output=$(cd contracts && forge build 2>&1)
          if echo "$output" | grep -q "^Warning"; then
            echo "❌ Compiler warnings detected:"
            echo "$output" | grep "^Warning"
            exit 1
          fi
          echo "✅ Zero warnings"

      - name: Gas snapshot
        run: cd contracts && forge snapshot --check --tolerance 5 || forge snapshot
        # Stores gas costs per test. PR will show regression if gas increases >5%.

      - name: Upload gas snapshot
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: gas-snapshot
          path: contracts/.gas-snapshot
          retention-days: 90

  sdk:
    name: SDK — Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install
        run: cd sdk && npm ci

      - name: Type check
        run: cd sdk && npx tsc --noEmit

      - name: Test
        run: cd sdk && npm test

      - name: Build
        run: cd sdk && npm run build

  # ─── Summary ───────────────────────────────────────────────────────────
  all-checks:
    name: All checks passed
    needs: [contracts, sdk]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.contracts.result }}" != "success" ] || \
             [ "${{ needs.sdk.result }}" != "success" ]; then
            echo "❌ One or more checks failed"
            exit 1
          fi
          echo "✅ All checks passed"
