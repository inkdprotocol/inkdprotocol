name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Contracts — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        run: cd contracts && forge build --force

      - name: Test
        run: cd contracts && forge test -vv

      - name: Check for warnings
        run: |
          output=$(cd contracts && forge build 2>&1)
          if echo "$output" | grep -q "^Warning"; then
            echo "❌ Compiler warnings detected:"
            echo "$output" | grep "^Warning"
            exit 1
          fi
          echo "✅ Zero warnings"

  sdk:
    name: SDK — Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install
        run: cd sdk && npm ci

      - name: Type check
        run: cd sdk && npx tsc --noEmit

      - name: Build
        run: cd sdk && npm run build
