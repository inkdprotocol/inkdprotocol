name: Deploy to Base Sepolia (Testnet)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DEPLOY TO TESTNET" to confirm'
        required: true
        default: ''
  push:
    branches:
      - 'release/**'

jobs:
  deploy-testnet:
    name: Deploy Contracts to Base Sepolia
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Validate manual confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY TO TESTNET" ]; then
            echo "❌ Confirmation failed. You must type exactly: DEPLOY TO TESTNET"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache Foundry
        uses: actions/cache@v5
        with:
          path: |
            ~/.foundry
            ~/.cargo
          key: foundry-${{ runner.os }}-${{ hashFiles('foundry.toml') }}
          restore-keys: |
            foundry-${{ runner.os }}-

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Forge dependencies
        run: forge install

      - name: Build contracts
        run: forge build

      - name: Deploy to Base Sepolia
        id: deploy
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          BASE_SEPOLIA_RPC: ${{ secrets.BASE_SEPOLIA_RPC }}
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
        run: |
          forge script contracts/Deploy.s.sol \
            --rpc-url $BASE_SEPOLIA_RPC \
            --private-key $DEPLOYER_PRIVATE_KEY \
            --broadcast \
            --verify \
            --etherscan-api-key $BASESCAN_API_KEY \
            -v 2>&1 | tee deploy-output.txt

      - name: Extract deployed addresses
        run: |
          python3 -c "
          import re, json, sys

          with open('deploy-output.txt', 'r') as f:
              content = f.read()

          # Extract contract addresses from Foundry output
          pattern = r'(\w+) deployed at: (0x[a-fA-F0-9]{40})'
          matches = re.findall(pattern, content)

          addresses = {name: addr for name, addr in matches}
          addresses['network'] = 'base-sepolia'
          addresses['chainId'] = 84532
          addresses['deployedAt'] = '$(date -u +%Y-%m-%dT%H:%M:%SZ)'

          with open('deployed-addresses.json', 'w') as f:
              json.dump(addresses, f, indent=2)

          print(json.dumps(addresses, indent=2))
          "

      - name: Upload deployed addresses
        uses: actions/upload-artifact@v7
        with:
          name: deployed-addresses-testnet
          path: deployed-addresses.json
          retention-days: 30

      - name: Comment on PR with addresses
        if: github.event_name == 'push' && github.event.pull_request
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const addresses = JSON.parse(fs.readFileSync('deployed-addresses.json', 'utf8'));
            const body = `## 🚀 Testnet Deployment Successful\n\n**Network:** Base Sepolia\n\n**Deployed Contracts:**\n\`\`\`json\n${JSON.stringify(addresses, null, 2)}\n\`\`\`\n\n[View on BaseScan](https://sepolia.basescan.org)`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
