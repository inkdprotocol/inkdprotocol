name: Release

# Triggered by a version tag: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # For GitHub Release creation
  id-token: write  # For npm provenance

jobs:
  # ─── Validate ────────────────────────────────────────────────────────────────
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Verify contracts build and test pass
        run: |
          cd contracts
          forge build --force
          forge test -vv
          forge test --match-contract InkdInvariantTest -vv

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK dependencies
        run: cd sdk && npm ci

      - name: Run SDK tests
        run: cd sdk && npm test

      - name: Type check SDK
        run: cd sdk && npx tsc --noEmit

      - name: Build SDK
        run: cd sdk && npm run build

  # ─── GitHub Release ───────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog entry
        id: changelog
        run: |
          # Pull the section for this version from CHANGELOG.md
          VERSION="${{ steps.tag.outputs.version }}"
          BODY=$(awk "/^## \[${VERSION}\]/,/^## \[/" CHANGELOG.md \
            | head -n -1 \
            | tail -n +2)
          # Escape newlines for GitHub output
          BODY="${BODY//'%'/'%25'}"
          BODY="${BODY//$'\n'/'%0A'}"
          BODY="${BODY//$'\r'/'%0D'}"
          echo "body=$BODY" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Inkd Protocol ${{ github.ref_name }}"
          body: |
            ## What's Changed in ${{ github.ref_name }}

            ${{ steps.changelog.outputs.body }}

            ---

            ### Install the SDK

            ```bash
            npm install @inkd/sdk
            ```

            ### Contracts

            | Contract      | Network | Address |
            |---------------|---------|---------|
            | InkdToken     | Base    | TBD     |
            | InkdRegistry  | Base    | TBD     |
            | InkdTreasury  | Base    | TBD     |

            Full docs: [inkdprotocol.xyz](https://inkdprotocol.xyz)
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ─── npm Publish ──────────────────────────────────────────────────────────
  npm-publish:
    name: Publish @inkd/sdk to npm
    needs: validate
    runs-on: ubuntu-latest
    environment: npm-publish  # Requires NPM_TOKEN secret in this env
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (with npm registry)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        run: cd sdk && npm ci

      - name: Build SDK
        run: cd sdk && npm run build

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd sdk && npm version "$VERSION" --no-git-tag-version

      - name: Publish to npm
        run: cd sdk && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Summary ─────────────────────────────────────────────────────────────
  release-done:
    name: Release complete
    needs: [github-release, npm-publish]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ${{ needs.github-release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm Publish    | ${{ needs.npm-publish.result }} |" >> $GITHUB_STEP_SUMMARY
