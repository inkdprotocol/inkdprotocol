name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  npm-publish-sdk:
    name: Publish @inkd/sdk to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install SDK dependencies
        run: cd sdk && npm ci

      - name: Build SDK
        run: cd sdk && npm run build

      - name: Publish @inkd/sdk
        run: cd sdk && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  npm-publish-cli:
    name: Publish @inkd/cli to npm
    runs-on: ubuntu-latest
    needs: npm-publish-sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install CLI dependencies
        run: cd cli && npm ci

      - name: Build CLI
        run: cd cli && npm run build

      - name: Publish @inkd/cli
        run: cd cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [npm-publish-sdk, npm-publish-cli]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install dependencies
        run: npm ci

      - name: Build SDK bundle
        run: npm run build

      - name: Build contracts and extract ABIs
        run: |
          forge install
          forge build
          mkdir -p release-artifacts/abis
          find out -name '*.json' -not -path '*/build-info/*' | while read f; do
            name=$(basename "$f")
            cp "$f" "release-artifacts/abis/$name"
          done

      - name: Package SDK bundle
        run: |
          mkdir -p release-artifacts
          tar -czf release-artifacts/inkd-sdk-${{ github.ref_name }}.tar.gz \
            -C dist . 2>/dev/null || \
          tar -czf release-artifacts/inkd-sdk-${{ github.ref_name }}.tar.gz \
            -C packages/sdk/dist .

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Inkd Protocol ${{ github.ref_name }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Packages

            - `@inkd/sdk` ${{ github.ref_name }} → [npm](https://www.npmjs.com/package/@inkd/sdk)
            - `@inkd/cli` ${{ github.ref_name }} → [npm](https://www.npmjs.com/package/@inkd/cli)

            ## Contract ABIs

            ABIs are included as release artifacts.
          files: |
            release-artifacts/abis/*.json
            release-artifacts/inkd-sdk-${{ github.ref_name }}.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
