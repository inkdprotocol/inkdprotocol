name: Deploy Telegram Bot

on:
  push:
    branches: [main]
    paths:
      - 'agents/telegram-bot/**'

jobs:
  deploy:
    name: Deploy to john-server
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 167.172.102.246
          username: root
          key: ${{ secrets.BOT_DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /root/inkd-protocol-repo
            git checkout -- .
            git pull origin main
            cd agents/telegram-bot
            npm ci --omit=dev
            npm run build
            pm2 restart inkd-bot
            echo "Deploy done: $(git log --oneline -1)"
