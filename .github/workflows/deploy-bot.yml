name: Deploy Telegram Bot

on:
  push:
    branches: [main]
    paths:
      - 'agents/telegram-bot/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Bot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build bot
        working-directory: agents/telegram-bot
        run: |
          npm ci
          npm run build

      - name: Copy dist to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.BOT_DEPLOY_HOST }}
          username: root
          key: ${{ secrets.BOT_DEPLOY_SSH_KEY }}
          source: "agents/telegram-bot/dist/*"
          target: "/root/inkd-protocol-repo/agents/telegram-bot/dist/"
          strip_components: 3

      - name: Restart bot via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.BOT_DEPLOY_HOST }}
          username: root
          key: ${{ secrets.BOT_DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /root/inkd-protocol-repo
            git fetch origin main
            git reset --hard origin/main
            pm2 restart inkd-bot
            echo "Deploy done: $(git log --oneline -1)"
