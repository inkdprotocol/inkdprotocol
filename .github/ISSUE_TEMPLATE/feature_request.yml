name: 🚀 Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Inkd Protocol? We'd love to hear it.
        Check the [ROADMAP.md](../../ROADMAP.md) first — your feature might already be planned!

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which area does this feature apply to?
      options:
        - Contracts (on-chain logic)
        - TypeScript SDK
        - CLI
        - Subgraph / Indexing
        - Documentation
        - Tooling / DevEx
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? What's the use case?
      placeholder: "As an AI agent, I need to... because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like.
      placeholder: "Add a `batchRegister()` function that..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative solutions you've thought about?

  - type: dropdown
    id: priority
    attributes:
      label: Priority (from your perspective)
      options:
        - Low — nice to have
        - Medium — would meaningfully improve my workflow
        - High — blocking me from using Inkd Protocol
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a PR to implement this feature
        - label: I can help with testing / review

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I checked [ROADMAP.md](../../ROADMAP.md) and this isn't already planned
          required: true
