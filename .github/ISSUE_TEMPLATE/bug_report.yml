name: 🐛 Bug Report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.
        **Security vulnerabilities** → report privately via [SECURITY.md](../../SECURITY.md).

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Inkd Protocol is affected?
      options:
        - Contracts (InkdRegistry / InkdToken / InkdTreasury)
        - TypeScript SDK (@inkd/sdk)
        - CLI (@inkd/cli)
        - API (api.inkdprotocol.com)
        - Telegram Bot (@inkdbot)
        - AgentKit (@inkd/agentkit)
        - MCP (@inkd/mcp)
        - Subgraph (The Graph)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: "When I call `registerProject()`, it reverts with..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal reproducible example. Code is strongly preferred over prose.
      render: typescript
      placeholder: |
        // Minimal reproduction — paste runnable code if possible
        import { ProjectsClient } from "@inkd/sdk";

        const client = new ProjectsClient({ ... });
        const result = await client.createProject({ ... });
        // Expected: ...
        // Got: Error: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include full error output if available.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in the relevant details.
      value: |
        - OS: [e.g. macOS 14, Ubuntu 22.04]
        - Node.js: [e.g. 20.11.0]
        - SDK version: [e.g. @inkd/sdk@0.1.0]
        - Foundry version: [e.g. forge 0.2.0]
        - Network: [e.g. Base Mainnet / Base Sepolia / Anvil]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      description: Paste any relevant output. This is automatically formatted as code.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I have read the [documentation](../../docs/README.md)
          required: false
        - label: This is not a security vulnerability (those go to SECURITY.md)
          required: true
