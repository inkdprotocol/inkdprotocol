################################################################################
#  Inkd Protocol — Subgraph Manifest
#  Network: Base (chain id 8453)
#
#  Replace the placeholder addresses with real deployed addresses after mainnet
#  deployment. See POST_DEPLOY.md for the full post-deploy checklist.
#
#  Deploy:
#    graph auth --studio <DEPLOY_KEY>
#    graph deploy --studio inkd-protocol
#
#  For Base Sepolia (testnet):
#    Update network → base-sepolia
#    Update addresses → deployed testnet addresses
################################################################################

specVersion: 0.0.5
description: Decentralized project registry and ownership layer for AI agents on Base
repository: https://github.com/inkdprotocol/inkd-protocol

schema:
  file: ./schema.graphql

dataSources:
  # ── InkdRegistry ────────────────────────────────────────────────────────────
  - kind: ethereum
    name: InkdRegistry
    network: base
    source:
      # Replace with deployed InkdRegistry proxy address after mainnet deploy
      address: "0x0000000000000000000000000000000000000000"
      abi: InkdRegistry
      # Replace with the block number of the deployment transaction
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Project
        - Version
        - Collaborator
        - ProjectTransfer
        - ProtocolStats
        - Account
      abis:
        - name: InkdRegistry
          file: ./abis/InkdRegistry.json
      eventHandlers:
        - event: ProjectCreated(indexed uint256,indexed address,string,string)
          handler: handleProjectCreated
        - event: VersionPushed(indexed uint256,string,string,address)
          handler: handleVersionPushed
        - event: CollaboratorAdded(indexed uint256,address)
          handler: handleCollaboratorAdded
        - event: CollaboratorRemoved(indexed uint256,address)
          handler: handleCollaboratorRemoved
        - event: ProjectTransferred(indexed uint256,indexed address,indexed address)
          handler: handleProjectTransferred
        - event: VisibilityChanged(indexed uint256,bool)
          handler: handleVisibilityChanged
        - event: VersionFeeUpdated(uint256,uint256)
          handler: handleVersionFeeUpdated
        - event: TransferFeeUpdated(uint256,uint256)
          handler: handleTransferFeeUpdated
        - event: ReadmeUpdated(indexed uint256,string)
          handler: handleReadmeUpdated
        - event: AgentRegistered(indexed uint256,string)
          handler: handleAgentRegistered
        - event: ProjectCreatedV2(indexed uint256,indexed address,string,uint256,string)
          handler: handleProjectCreatedV2
        - event: VersionPushedV2(indexed uint256,string,string,indexed address,address)
          handler: handleVersionPushedV2
        - event: MetadataUriUpdated(indexed uint256,string)
          handler: handleMetadataUriUpdated
        - event: AccessManifestUpdated(indexed uint256,string)
          handler: handleAccessManifestUpdated
        - event: ProjectForked(indexed uint256,indexed uint256,indexed address)
          handler: handleProjectForked
      file: ./src/registry.ts

  # ── InkdTreasury ────────────────────────────────────────────────────────────
  - kind: ethereum
    name: InkdTreasury
    network: base
    source:
      # Replace with deployed InkdTreasury proxy address after mainnet deploy
      address: "0x0000000000000000000000000000000000000000"
      abi: InkdTreasury
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TreasuryEvent
        - ProtocolStats
      abis:
        - name: InkdTreasury
          file: ./abis/InkdTreasury.json
      eventHandlers:
        - event: Deposited(indexed address,uint256)
          handler: handleDeposited
        - event: Withdrawn(indexed address,uint256)
          handler: handleWithdrawn
        - event: Received(indexed address,uint256)
          handler: handleReceived
      file: ./src/treasury.ts
