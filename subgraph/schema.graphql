################################################################################
#  Inkd Protocol — The Graph Schema
#  Network: Base (mainnet + Sepolia)
################################################################################

# ─── Project ─────────────────────────────────────────────────────────────────

"""
A registered project on Inkd Protocol.
"""
type Project @entity {
  " Stringified projectId (uint256) "
  id: ID!

  " On-chain project ID "
  projectId: BigInt!

  " Normalized (lowercase) project name — unique forever "
  name: String!

  " Human-readable description "
  description: String!

  " SPDX license identifier (MIT, Apache-2.0, GPL-3.0, Proprietary…) "
  license: String!

  " Arweave hash of the README / docs "
  readmeHash: String!

  " Current owner address "
  owner: Bytes!

  " Whether the project is publicly visible "
  isPublic: Boolean!

  " Whether this project represents an AI agent "
  isAgent: Boolean!

  " HTTP(S) endpoint of the agent (if isAgent) "
  agentEndpoint: String!

  " Block timestamp when the project was created "
  createdAt: BigInt!

  " Number of versions pushed so far "
  versionCount: BigInt!

  " All versions pushed to this project "
  versions: [Version!]! @derivedFrom(field: "project")

  " Active collaborators on this project "
  collaborators: [Collaborator!]! @derivedFrom(field: "project")

  " Historical ownership transfers "
  transfers: [ProjectTransfer!]! @derivedFrom(field: "project")

  " [V2] Arweave hash of extensible project metadata JSON "
  metadataUri: String

  " [V2] Fork lineage — projectId this was forked from (0 = original) "
  forkOf: BigInt

  " [V2] Arweave hash of multi-wallet access control manifest "
  accessManifest: String

  " [V2] Projects that forked from this one "
  forks: [Project!]! @derivedFrom(field: "forkOf")
}

# ─── Version ──────────────────────────────────────────────────────────────────

"""
A versioned file upload. Each push stores a permanent Arweave hash on-chain.
"""
type Version @entity {
  " {projectId}-{versionIndex} "
  id: ID!

  " Parent project "
  project: Project!

  " Arweave content hash (ar://<hash>) "
  arweaveHash: String!

  " Semver-style version tag (e.g. 1.0.0, alpha, beta) "
  versionTag: String!

  " On-chain changelog text "
  changelog: String!

  " Address that pushed this version (server relay wallet) "
  pushedBy: Bytes!

  " [V2] Real agent/user address that initiated the push "
  agentAddress: Bytes

  " Block timestamp of the push "
  pushedAt: BigInt!

  " Block number for traceability "
  blockNumber: BigInt!

  " Transaction hash "
  transactionHash: Bytes!
}

# ─── Collaborator ─────────────────────────────────────────────────────────────

"""
A collaborator on a project. Can push versions but cannot transfer ownership.
"""
type Collaborator @entity {
  " {projectId}-{address} "
  id: ID!

  " Parent project "
  project: Project!

  " Collaborator wallet address "
  address: Bytes!

  " Block timestamp when added "
  addedAt: BigInt!

  " True if still an active collaborator "
  active: Boolean!
}

# ─── ProjectTransfer ──────────────────────────────────────────────────────────

"""
A historical ownership transfer event for a project.
"""
type ProjectTransfer @entity {
  " {transactionHash}-{logIndex} "
  id: ID!

  " The transferred project "
  project: Project!

  " Previous owner "
  from: Bytes!

  " New owner "
  to: Bytes!

  " Block timestamp "
  timestamp: BigInt!

  " Block number "
  blockNumber: BigInt!

  " Transaction hash "
  transactionHash: Bytes!
}

# ─── Protocol Stats ───────────────────────────────────────────────────────────

"""
Global aggregated stats for the Inkd Protocol. Singleton entity (id = "global").
"""
type ProtocolStats @entity {
  " Always 'global' "
  id: ID!

  " Total number of projects registered "
  totalProjects: BigInt!

  " Total number of versions pushed across all projects "
  totalVersions: BigInt!

  " Number of projects flagged as AI agent projects "
  totalAgentProjects: BigInt!

  " Total ETH collected in version push fees (wei) "
  totalVersionFees: BigInt!

  " Total ETH collected in transfer fees (wei) "
  totalTransferFees: BigInt!

  " Current version push fee (wei) "
  versionFee: BigInt!

  " Current project transfer fee (wei) "
  transferFee: BigInt!

  " Block timestamp of last update "
  lastUpdated: BigInt!
}

# ─── Treasury Events ──────────────────────────────────────────────────────────

"""
Individual treasury deposit/withdrawal/receive events for auditing.
"""
type TreasuryEvent @entity {
  " {transactionHash}-{logIndex} "
  id: ID!

  " 'deposit' | 'withdraw' | 'receive' "
  eventType: String!

  " Source (for deposits/receives) or destination (for withdrawals) "
  account: Bytes!

  " Amount in wei "
  amount: BigInt!

  " Block timestamp "
  timestamp: BigInt!

  " Block number "
  blockNumber: BigInt!

  " Transaction hash "
  transactionHash: Bytes!
}

# ─── Account ──────────────────────────────────────────────────────────────────

"""
An on-chain account that has interacted with the protocol.
"""
type Account @entity {
  " Wallet address "
  id: ID!

  " Projects owned by this account "
  ownedProjects: [Project!]! @derivedFrom(field: "owner")

  " Projects this account has collaborated on "
  collaborations: [Collaborator!]! @derivedFrom(field: "address")

  " Versions pushed by this account "
  versionsPushed: [Version!]! @derivedFrom(field: "pushedBy")
}
